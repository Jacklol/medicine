<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <title>тест</title>
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="description" content="тест">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

        <meta property="og:title" content="тест" />
        <meta property="og:description" content="тест" />
        <meta property="og:image:type" content="image/jpeg" />
        <meta property="og:image:width" content="800" />
        <meta property="og:image:height" content="480" />
        <meta property="og:image" content="images/share.jpg" />

        <meta name="twitter:card" content="summary">
        <meta name="twitter:title" content="тест">
        <meta name="twitter:description" content="тест">
        <meta name="twitter:image" content="images/share.jpg">

        <link href="https://fonts.googleapis.com/css?family=Oxygen:400,700" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="css/normalize.css">
        <link rel="stylesheet" href="css/index.css?v=simple-2">
    </head>
    <body>
        <header class="site-header">
            <a class="brand" href="#top" aria-label="тест">
                <span class="brand-mark"></span>
                тест
            </a>
            <nav class="site-nav" aria-label="Навигация">
                <a href="#blood">Кровь</a>
                <a href="#eye">Глаз</a>
                <a href="#lens-aging">Хрусталик</a>
                <a href="#constraint">Сердце</a>
            </nav>
        </header>

        <main>
            <section class="test-title" id="top">
                <h1>тест</h1>
            </section>

            <section class="animation-section blood-section" id="blood">
                <div class="animation-heading">
                    <span>01</span>
                    <h2>Кровь и сердце</h2>
                </div>
                <div class="visual-shell" aria-label="Анимация крови и сердца">
                    <div class="visual-stage"></div>
                    <iframe class="hero-heart-frame" src="particle-love/constraint/index.html?v=shape-12&transparent=1&hero=1#motionBlurQuality=medium" title="Анимация сердца в потоке крови"></iframe>
                </div>
            </section>

            <section class="animation-section eye-section" id="eye">
                <div class="animation-heading">
                    <span>02</span>
                    <h2>Глаз</h2>
                </div>
                <div class="eye-shell">
                    <iframe class="eye-frame" src="eye-anatomy/index.html?v=eye-12&showcase=1" title="Интерактивная модель глаза"></iframe>
                </div>
            </section>

            <section class="animation-section lens-aging-section" id="lens-aging" data-lens-aging>
                <div class="animation-heading">
                    <span>03</span>
                    <h2>Хрусталик</h2>
                </div>
                <div class="lens-aging-sticky">
                    <div class="lens-aging-copy">
                        <div class="lens-aging-readout" aria-live="polite">
                            <strong class="lens-stage-title">Clear young lens</strong>
                            <span class="lens-stage-body">High contrast, neutral color, and a sharp retinal image.</span>
                        </div>
                    </div>
                    <div class="lens-aging-visual" aria-label="Симуляция прозрачности хрусталика">
                        <div class="vision-window">
                            <img class="vision-image" src="images/lens-vision.svg" alt="">
                            <div class="vision-haze"></div>
                            <div class="vision-vignette"></div>
                            <div class="lens-optic old-lens"></div>
                            <div class="lens-optic new-lens"></div>
                        </div>
                        <div class="lens-slider-control">
                            <input class="lens-progress-slider" type="range" min="0" max="100" value="0" step="1" aria-label="Стадия хрусталика">
                            <output class="lens-slider-value" aria-live="polite">20 years</output>
                        </div>
                        <div class="lens-timeline" aria-hidden="true">
                            <span data-step="0">20</span>
                            <span data-step="1">45</span>
                            <span data-step="2">65</span>
                            <span data-step="3">78</span>
                            <span data-step="4">New lens</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="animation-section constraint-section" id="constraint">
                <div class="animation-heading">
                    <span>04</span>
                    <h2>Сердце</h2>
                </div>
                <div class="constraint-shell">
                    <iframe class="constraint-frame" src="particle-love/constraint/index.html?v=shape-12#motionBlurQuality=medium" title="Интерактивная модель сердца" loading="lazy"></iframe>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <span>тест</span>
        </footer>

        <div class="mobile" aria-hidden="true"></div>
        <div class="logo" aria-hidden="true"></div>
        <div class="instruction" aria-hidden="true">Press space key to toggle movement</div>
        <div class="footer" aria-hidden="true">
            <span><a href="http://www.edankwan.com/" target="_blank">Edan Kwan</a></span>
            <span>|</span>
            <span><a href="https://github.com/edankwan/hyper-mix" target="_blank">Github</a></span>
            <span>|</span>
            <span><a href="https://www.youtube.com/watch?v=tcyAdqW8DrM" target="_blank">Youtube</a></span>
        </div>
        <script src="js/three.r74.min.js"></script>
        <script src="js/index.js?v=sync-1"></script>
        <script src="js/lens-aging.js?v=lens-3"></script>
    </body>
</html>
